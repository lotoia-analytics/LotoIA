name: DB Audit

on:
  workflow_dispatch:
    inputs:
      sql:
        description: "SQL opcional para executar no PostgreSQL institucional"
        required: false
        default: ""
        type: string
  push:
    paths:
      - ".github/workflows/db-audit.yml"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Connection smoke test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret não configurado."
            exit 1
          fi
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "SELECT current_database() AS database, now() AS checked_at;"

      - name: Audit latest Lotofacil contest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          TABLE_NAME=$(psql "$DATABASE_URL" -At -v ON_ERROR_STOP=1 -c "SELECT CASE WHEN to_regclass('public.lotofacil_official_history') IS NOT NULL THEN 'lotofacil_official_history' WHEN to_regclass('public.imported_contests') IS NOT NULL THEN 'imported_contests' ELSE '' END;")

          if [ -z "$TABLE_NAME" ]; then
            echo "Nenhuma tabela institucional encontrada: lotofacil_official_history/imported_contests."
            echo "Tabelas públicas disponíveis:"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' ORDER BY table_name;"
            exit 1
          fi

          echo "Tabela institucional encontrada: $TABLE_NAME"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "SELECT * FROM public.$TABLE_NAME ORDER BY contest_number DESC LIMIT 1;"

      - name: Optional manual SQL
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sql != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SQL: ${{ inputs.sql }}
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "$SQL"
