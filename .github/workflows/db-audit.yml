name: DB Access Check

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/db-audit.yml"

permissions:
  contents: write

jobs:
  db-access:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Verify PostgreSQL access
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret vazio ou não configurado."
            exit 1
          fi

          mkdir -p runtime
          echo "db_access_check_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > runtime/db-access-confirmation.txt
          echo "commit_sha=${GITHUB_SHA}" >> runtime/db-access-confirmation.txt
          echo "status=OK" >> runtime/db-access-confirmation.txt
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "SELECT 'database=' || current_database();" >> runtime/db-access-confirmation.txt
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "SELECT 'db_user=' || current_user;" >> runtime/db-access-confirmation.txt
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "SELECT 1 AS db_access_ok;"
          cat runtime/db-access-confirmation.txt

      - name: Commit DB access confirmation
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/db-access-confirmation.txt
          git commit -m "chore: confirm database access" || echo "No confirmation changes to commit"
          git push
