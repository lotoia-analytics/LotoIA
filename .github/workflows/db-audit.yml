name: DB Access Check

on:
  workflow_dispatch:
    inputs:
      sql:
        description: "SQL opcional para executar depois do teste de conexão"
        required: false
        default: ""
        type: string
  push:
    paths:
      - ".github/workflows/db-audit.yml"

jobs:
  db-access:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Verify PostgreSQL access
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret não configurado."
            exit 1
          fi

          echo "DATABASE_URL secret encontrado."
          echo "Testando conexão PostgreSQL..."
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "SELECT 1 AS db_access_ok;"
          echo "Acesso ao PostgreSQL confirmado."

      - name: Optional manual SQL
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sql != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SQL: ${{ inputs.sql }}
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "$SQL"
