name: DB Access Check

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/db-audit.yml"

jobs:
  db-access:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Verify PostgreSQL access
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret vazio ou não configurado."
            exit 1
          fi

          echo "Testando acesso ao PostgreSQL..."
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "SELECT 1 AS db_access_ok;"
          echo "DB_ACCESS_OK"
