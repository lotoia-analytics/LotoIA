name: Prefix Official Window Audit

on:
  workflow_dispatch:
    inputs:
      window:
        description: "Quantidade de concursos oficiais recentes"
        required: true
        default: "300"
      prefixes:
        description: "Prefixos separados por vírgula"
        required: true
        default: "01-02-05,03-06-07,01-02-06,03-04-06,01-03-05,03-04-05,02-04-05,01-03-07"

jobs:
  prefix-official-window-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy psycopg2-binary

      - name: Run prefix audit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/maintenance/prefix_official_window_audit.py \
            --window "${{ inputs.window }}" \
            --prefixes "${{ inputs.prefixes }}"

      - name: Upload prefix audit reports
        uses: actions/upload-artifact@v4
        with:
          name: prefix-official-window-audit
          path: |
            prefix-official-window-audit.json
            prefix-official-window-audit.csv
